<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal 21 - Poker × Blackjack</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Royal 21</h1>
            <p>Poker × Blackjack Hybrid</p>
        </header>

        <!-- Main Game Area -->
        <div class="game-wrapper">
            <!-- Table Display -->
            <div class="table">
                <div class="table-inner">
                    <div class="pot-display">
                        <div class="pot-info">
                            <div class="pot-item">
                                <span class="pot-label">Normal Pot</span>
                                <span class="pot-amount" id="normalPot">0</span>
                            </div>
                            <div class="pot-item">
                                <span class="pot-label">Escrow Pot</span>
                                <span class="pot-amount" id="escrowPot">0</span>
                            </div>
                            <div class="pot-item">
                                <span class="pot-label">Table Total</span>
                                <span class="pot-amount" id="tableTotal">0</span>
                            </div>
                        </div>
                    </div>

                    <!-- Player Seats -->
                    <div class="seats-container" id="seatsContainer">
                        <!-- Seats will be generated by JS -->
                    </div>
                </div>
            </div>

            <!-- Right Sidebar -->
            <aside class="sidebar">
                <!-- Game Info -->
                <div class="panel game-info-panel">
                    <h3>Game Info</h3>
                    <div class="info-item">
                        <span class="label">Phase:</span>
                        <span class="value" id="phaseDisplay">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Your Seat:</span>
                        <span class="value" id="seatDisplay">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Current Action:</span>
                        <span class="value" id="actionDisplay">-</span>
                    </div>
                </div>

                <!-- Hand Log -->
                <div class="panel hand-log-panel">
                    <h3>Action Log</h3>
                    <div class="log-content" id="logContent">
                        <div class="log-entry">Game started</div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="panel controls-panel">
                    <h3>Controls</h3>
                    <button id="startGameBtn" class="btn btn-primary">Start Game</button>
                    <button id="createGameBtn" class="btn btn-secondary">New Game</button>
                </div>
            </aside>
        </div>

        <!-- Bottom Action Panel -->
        <div class="action-panel" id="actionPanel">
            <!-- Betting Actions -->
            <div class="action-group" id="bettingActions" style="display: none;">
                <div class="action-row">
                    <label>Escrow Add:</label>
                    <input type="number" id="escrowAmount" min="0" value="0">
                    <button class="btn btn-action" onclick="sendAction('escrow_add')">Add Escrow</button>
                </div>
                <div class="action-row">
                    <button class="btn btn-danger" onclick="sendAction('fold')">Fold</button>
                    <button class="btn btn-action" onclick="sendAction('check')">Check</button>
                    <button class="btn btn-action" onclick="sendAction('call')">Call</button>
                </div>
                <div class="action-row">
                    <label>Bet/Raise Amount:</label>
                    <input type="number" id="betAmount" min="1" value="1">
                    <button class="btn btn-action" onclick="sendAction('bet')">Bet</button>
                    <button class="btn btn-action" onclick="sendAction('raise')">Raise</button>
                </div>
            </div>

            <!-- Draw Actions -->
            <div class="action-group" id="drawActions" style="display: none;">
                <button class="btn btn-action" onclick="sendAction('stand')">Stand</button>
                <button class="btn btn-action" onclick="sendAction('hit')">Hit</button>
                <button class="btn btn-action" onclick="sendAction('double')">Double</button>
                <button class="btn btn-action" onclick="sendAction('split')">Split</button>
            </div>

            <!-- No Action -->
            <div class="action-group" id="waitingMessage" style="display: none;">
                <p>Waiting for other players...</p>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Game Creation Modal -->
    <div id="gameModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Create Game</h2>
            <div class="form-group">
                <label>Number of Players:</label>
                <select id="playerCount">
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7" selected>7</option>
                </select>
            </div>
            <div class="form-group">
                <label>Starting Stack:</label>
                <input type="number" id="startingStack" value="200" min="50">
            </div>
            <button class="btn btn-primary" onclick="createGame()">Create</button>
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
