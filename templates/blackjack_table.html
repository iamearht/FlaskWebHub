<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal 21 Table</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1f2937 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        h1 {
            font-size: 1.8rem;
        }

        .table-info {
            display: flex;
            gap: 30px;
            font-size: 0.95rem;
        }

        .table-info div {
            display: flex;
            flex-direction: column;
        }

        .table-info label {
            font-weight: bold;
            color: #bbb;
            font-size: 0.85rem;
        }

        .table-info value {
            font-size: 1.2rem;
            color: #22c55e;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #22c55e;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #16a34a;
        }

        .btn-secondary {
            background: #3b82f6;
        }

        .btn-secondary:hover {
            background: #2563eb;
        }

        /* Table Layout */
        .table-view {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .poker-table {
            background: linear-gradient(135deg, #065f46 0%, #047857 100%);
            border-radius: 50% 50% 40% 40%;
            padding: 40px;
            position: relative;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5), 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .seats-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .seat {
            position: absolute;
            width: 120px;
            height: 140px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s;
            cursor: pointer;
        }

        .seat:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .seat.current {
            background: rgba(34, 197, 94, 0.3);
            border-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }

        .seat.button {
            background: rgba(255, 193, 7, 0.3);
            border-color: #fbbf24;
        }

        .seat.folded {
            opacity: 0.6;
        }

        .seat-number {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 5px;
        }

        .player-name {
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 5px;
            min-height: 20px;
        }

        .player-stack {
            font-size: 0.85rem;
            color: #bbb;
        }

        .player-circles {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            font-size: 0.75rem;
        }

        .circle {
            flex: 1;
            padding: 3px;
            border-radius: 3px;
            text-align: center;
        }

        .circle-normal {
            background: rgba(59, 130, 246, 0.6);
        }

        .circle-escrow {
            background: rgba(168, 85, 247, 0.6);
        }

        .card {
            font-size: 1.2rem;
            margin-top: 5px;
        }

        /* Position seats around table */
        .seat:nth-child(1) { top: 20px; left: 50%; transform: translateX(-50%); }
        .seat:nth-child(2) { top: 80px; right: 60px; }
        .seat:nth-child(3) { bottom: 80px; right: 60px; }
        .seat:nth-child(4) { bottom: 20px; left: 50%; transform: translateX(-50%); }
        .seat:nth-child(5) { bottom: 80px; left: 60px; }
        .seat:nth-child(6) { top: 80px; left: 60px; }
        .seat:nth-child(7) { top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* Right Sidebar */
        .sidebar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        .pot-display {
            margin-bottom: 20px;
        }

        .pot-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .pot-label {
            font-weight: bold;
        }

        .pot-value {
            color: #22c55e;
            font-weight: bold;
        }

        .phase-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
        }

        .phase-value {
            font-size: 1.1rem;
            color: #fbbf24;
            font-weight: bold;
        }

        .actions {
            margin-top: 20px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 12px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .action-btn:hover {
            background: #2563eb;
        }

        .action-btn:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            font-size: 0.9rem;
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #bbb;
        }

        .error {
            color: #ef4444;
            padding: 15px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 4px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🎰 Royal 21 Table #{{ table_id }}</h1>
            </div>
            <div class="table-info">
                <div>
                    <label>Phase</label>
                    <value id="currentPhase">Loading...</value>
                </div>
                <div>
                    <a href="{{ url_for('blackjack.blackjack_lobby') }}" class="btn btn-secondary">
                        ← Back to Lobby
                    </a>
                </div>
            </div>
        </header>

        <div class="table-view">
            <div class="poker-table">
                <div class="seats-container" id="seatsContainer">
                    <!-- Seats will be populated by JS -->
                </div>
            </div>

            <div class="sidebar">
                <h3>Game Info</h3>

                <div class="phase-display">
                    <div style="font-size: 0.8rem; color: #bbb;">Current Phase</div>
                    <div class="phase-value" id="phaseValue">Setup</div>
                </div>

                <h3 style="margin-top: 20px;">Pots</h3>
                <div class="pot-display">
                    <div class="pot-item">
                        <span class="pot-label">Normal Pot</span>
                        <span class="pot-value" id="normalPot">0</span>
                    </div>
                    <div class="pot-item">
                        <span class="pot-label">Escrow Pot</span>
                        <span class="pot-value" id="escrowPot">0</span>
                    </div>
                    <div class="pot-item" style="background: rgba(34, 197, 94, 0.1);">
                        <span class="pot-label"><strong>Total</strong></span>
                        <span class="pot-value" id="totalPot"><strong>0</strong></span>
                    </div>
                </div>

                <div class="actions">
                    <button class="action-btn" onclick="startHand()" id="startHandBtn">
                        Start Hand
                    </button>
                    <button class="action-btn" onclick="advancePhase()" id="advanceBtn">
                        Advance Phase
                    </button>
                </div>

                <div class="status" id="status">
                    Connecting...
                </div>
            </div>
        </div>
    </div>

    <script>
        const TABLE_ID = {{ table_id }};
        let gameState = null;
        let updateInterval = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateGameState();
            updateInterval = setInterval(updateGameState, 2000);
        });

        async function updateGameState() {
            try {
                const response = await fetch(`/blackjack/api/table/${TABLE_ID}/state`);
                if (!response.ok) throw new Error('Failed to fetch state');

                gameState = await response.json();
                renderTable();
                updateUI();
            } catch (error) {
                console.error('Error updating state:', error);
                document.getElementById('status').innerHTML = `❌ Error: ${error.message}`;
            }
        }

        function renderTable() {
            if (!gameState || !gameState.players) return;

            const container = document.getElementById('seatsContainer');
            container.innerHTML = '';

            gameState.players.forEach(player => {
                const seatEl = document.createElement('div');
                seatEl.className = 'seat';

                if (player.seat === gameState.current_player_seat) {
                    seatEl.classList.add('current');
                }

                const stackColor = player.stack > 500 ? '#22c55e' : player.stack > 100 ? '#fbbf24' : '#ef4444';

                seatEl.innerHTML = `
                    <div class="seat-number">Seat ${player.seat + 1}</div>
                    <div class="player-name">${player.username || 'Empty'}</div>
                    ${player.revealed_card ? `<div class="card">${player.revealed_card}</div>` : ''}
                    <div class="player-circles">
                        <div class="circle circle-normal">N: ${player.normal_circle}</div>
                        <div class="circle circle-escrow">E: ${player.escrow_circle}</div>
                    </div>
                    <div class="player-stack" style="color: ${stackColor}">
                        ${player.stack} 💰
                    </div>
                `;

                container.appendChild(seatEl);
            });
        }

        function updateUI() {
            if (!gameState) return;

            // Update phase
            const phase = gameState.phase || 'setup';
            document.getElementById('phaseValue').textContent = phase.charAt(0).toUpperCase() + phase.slice(1);
            document.getElementById('currentPhase').innerHTML = `<value>${phase}</value>`;

            // Update pots
            const normal = gameState.normal_pot || 0;
            const escrow = gameState.escrow_pot || 0;
            const total = normal + escrow;

            document.getElementById('normalPot').textContent = normal;
            document.getElementById('escrowPot').textContent = escrow;
            document.getElementById('totalPot').textContent = total;

            // Update buttons
            document.getElementById('startHandBtn').disabled = gameState.phase !== 'setup';
            document.getElementById('advanceBtn').disabled = gameState.phase === 'hand_over';

            // Update status
            if (gameState.current_player_seat !== null) {
                const player = gameState.players[gameState.current_player_seat];
                document.getElementById('status').innerHTML = `
                    <strong>${player.username}'s Turn</strong>
                `;
            } else {
                document.getElementById('status').innerHTML = 'Waiting for players...';
            }
        }

        async function startHand() {
            try {
                const response = await fetch(`/blackjack/api/table/${TABLE_ID}/start_hand`, {
                    method: 'POST',
                });

                if (!response.ok) throw new Error('Failed to start hand');

                updateGameState();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        async function advancePhase() {
            try {
                const response = await fetch(`/blackjack/api/table/${TABLE_ID}/advance_phase`, {
                    method: 'POST',
                });

                if (!response.ok) throw new Error('Failed to advance phase');

                updateGameState();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (updateInterval) clearInterval(updateInterval);
        });
    </script>
</body>
</html>
