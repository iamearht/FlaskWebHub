<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal 21 Table</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1f2937 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        h1 {
            font-size: 1.8rem;
        }

        .table-info {
            display: flex;
            gap: 30px;
            font-size: 0.95rem;
        }

        .table-info div {
            display: flex;
            flex-direction: column;
        }

        .table-info label {
            font-weight: bold;
            color: #bbb;
            font-size: 0.85rem;
        }

        .table-info value {
            font-size: 1.2rem;
            color: #22c55e;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #22c55e;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #16a34a;
        }

        .btn-secondary {
            background: #3b82f6;
        }

        .btn-secondary:hover {
            background: #2563eb;
        }

        /* Table Layout */
        .table-view {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .poker-table {
            background: linear-gradient(135deg, #065f46 0%, #047857 100%);
            border-radius: 50% 50% 40% 40%;
            padding: 40px;
            position: relative;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5), 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .seats-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .seat {
            position: absolute;
            width: 120px;
            height: 140px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s;
            cursor: pointer;
        }

        .seat:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .seat.current {
            background: rgba(34, 197, 94, 0.3);
            border-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }

        .seat.button {
            background: rgba(255, 193, 7, 0.3);
            border-color: #fbbf24;
        }

        .dealer-button {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 32px;
            height: 32px;
            background: #fbbf24;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            border: 2px solid #f59e0b;
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.8);
        }

        .seat.folded {
            opacity: 0.6;
        }

        .cards-display {
            margin-top: 5px;
            font-size: 0.9rem;
            min-height: 24px;
        }

        .seat-number {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 5px;
        }

        .player-name {
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 5px;
            min-height: 20px;
        }

        .player-stack {
            font-size: 0.85rem;
            color: #bbb;
        }

        .player-circles {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            font-size: 0.75rem;
        }

        .circle {
            flex: 1;
            padding: 3px;
            border-radius: 3px;
            text-align: center;
        }

        .circle-normal {
            background: rgba(59, 130, 246, 0.6);
        }

        .circle-escrow {
            background: rgba(168, 85, 247, 0.6);
        }

        .card {
            font-size: 1.2rem;
            margin-top: 5px;
        }

        /* Position 5 seats in pentagon around table */
        .seat:nth-child(1) { top: 10%; left: 50%; transform: translateX(-50%); }
        .seat:nth-child(2) { top: 30%; right: 8%; }
        .seat:nth-child(3) { bottom: 15%; right: 12%; }
        .seat:nth-child(4) { bottom: 15%; left: 12%; }
        .seat:nth-child(5) { top: 30%; left: 8%; }

        /* Right Sidebar */
        .sidebar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        .pot-display {
            margin-bottom: 20px;
        }

        .pot-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .pot-label {
            font-weight: bold;
        }

        .pot-value {
            color: #22c55e;
            font-weight: bold;
        }

        .phase-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
        }

        .phase-value {
            font-size: 1.1rem;
            color: #fbbf24;
            font-weight: bold;
        }

        .actions {
            margin-top: 20px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 12px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .action-btn:hover {
            background: #2563eb;
        }

        .action-btn:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            font-size: 0.9rem;
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #bbb;
        }

        .error {
            color: #ef4444;
            padding: 15px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .join-btn {
            padding: 6px 12px;
            background: #22c55e;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 5px;
        }

        .join-btn:hover {
            background: #16a34a;
        }

        .action-panel {
            background: rgba(59, 130, 246, 0.1);
            border: 2px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .action-panel h4 {
            margin-bottom: 12px;
            color: #3b82f6;
        }

        .action-step {
            background: rgba(255, 193, 7, 0.1);
            border-left: 3px solid #fbbf24;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .action-buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .action-btn-small {
            padding: 8px;
            font-size: 0.85rem;
        }

        .bet-input-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .bet-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #3b82f6;
            border-radius: 4px;
            background: rgba(59, 130, 246, 0.1);
            color: #fff;
            font-size: 0.9rem;
        }

        .bet-input::placeholder {
            color: #666;
        }

        .bet-limits {
            font-size: 0.8rem;
            color: #bbb;
            margin-top: 8px;
        }

        .phase-step-display {
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255, 193, 7, 0.1);
            border-radius: 4px;
            text-align: center;
        }

        .step-indicator {
            display: inline-block;
            padding: 4px 8px;
            background: #fbbf24;
            color: #000;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🎰 Royal 21 Table #{{ table_id }}</h1>
            </div>
            <div class="table-info">
                <div>
                    <label>Phase</label>
                    <value id="currentPhase">Loading...</value>
                </div>
                <div>
                    <a href="{{ url_for('game.lobby') }}" class="btn btn-secondary">
                        ← Back to Lobby
                    </a>
                </div>
            </div>
        </header>

        <div class="table-view">
            <div class="poker-table">
                <div class="seats-container" id="seatsContainer">
                    <!-- Seats will be populated by JS -->
                </div>
            </div>

            <div class="sidebar">
                <h3>Game Info</h3>

                <div class="phase-display">
                    <div style="font-size: 0.8rem; color: #bbb;">Current Phase</div>
                    <div class="phase-value" id="phaseValue">Setup</div>
                </div>

                <h3 style="margin-top: 20px;">Pots</h3>
                <div class="pot-display">
                    <div class="pot-item">
                        <span class="pot-label">Normal Pot</span>
                        <span class="pot-value" id="normalPot">0</span>
                    </div>
                    <div class="pot-item">
                        <span class="pot-label">Escrow Pot</span>
                        <span class="pot-value" id="escrowPot">0</span>
                    </div>
                    <div class="pot-item" style="background: rgba(34, 197, 94, 0.1);">
                        <span class="pot-label"><strong>Total</strong></span>
                        <span class="pot-value" id="totalPot"><strong>0</strong></span>
                    </div>
                </div>

                <div class="actions">
                    <button class="action-btn" onclick="toggleReady()" id="readyBtn">
                        ✓ Ready
                    </button>
                    <button class="action-btn" onclick="advancePhase()" id="advanceBtn">
                        Advance Phase
                    </button>
                </div>

                <div id="readyStatus" style="margin-top: 15px; padding: 10px; background: rgba(255, 255, 255, 0.05); border-radius: 4px; text-align: center; font-size: 0.9rem; color: #bbb;"></div>

                <!-- Action Panel (shown during betting/draw phases) -->
                <div class="action-panel" id="actionPanel" style="display: none;">
                    <h4>Your Action</h4>
                    <div class="phase-step-display" id="stepDisplay"></div>

                    <!-- Escrow Step Actions -->
                    <div id="escrowActions" style="display: none;">
                        <div class="action-step">Escrow Step - Add chips or skip</div>
                        <div class="action-buttons-grid">
                            <button class="action-btn action-btn-small" onclick="playerAction('add_escrow', 0)">Skip</button>
                            <button class="action-btn action-btn-small" onclick="showEscrowInput()">Add Escrow</button>
                        </div>
                        <div class="bet-input-group" id="escrowInputGroup" style="display: none;">
                            <input type="number" id="escrowAmount" class="bet-input" placeholder="Amount" min="1">
                            <button class="action-btn action-btn-small" onclick="submitEscrow()">OK</button>
                        </div>
                    </div>

                    <!-- Normal Betting Step Actions -->
                    <div id="normalBetActions" style="display: none;">
                        <div class="action-step">Betting Round</div>
                        <div id="betActionButtons"></div>
                        <div class="bet-limits" id="betLimits"></div>
                    </div>

                    <!-- Draw Phase Actions -->
                    <div id="drawActions" style="display: none;">
                        <div class="action-buttons-grid">
                            <button class="action-btn action-btn-small" onclick="playerAction('hit')">Hit</button>
                            <button class="action-btn action-btn-small" onclick="playerAction('stand')">Stand</button>
                            <button class="action-btn action-btn-small" id="doubleBtn" onclick="playerAction('double')" style="display: none;">Double</button>
                            <button class="action-btn action-btn-small" id="splitBtn" onclick="playerAction('split')" style="display: none;">Split</button>
                        </div>
                    </div>
                </div>

                <div class="status" id="status">
                    Connecting...
                </div>
            </div>
        </div>
    </div>

    <script>
        const TABLE_ID = {{ table_id }};
        let gameState = null;
        let updateInterval = null;
        let isPlayerReady = false;

        // Socket.IO setup
        const socket = io('/game/blackjack');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Connect to socket and join table
            socket.emit('join_table', { table_id: TABLE_ID, seat: null });
        });

        async function updateGameState() {
            // Request state via Socket.IO
            socket.emit('get_table_state', { table_id: TABLE_ID });
        }

        function renderTable() {
            if (!gameState) return;

            const container = document.getElementById('seatsContainer');
            if (!container) {
                console.error('seatsContainer not found');
                return;
            }
            container.innerHTML = '';

            // Get seated players map for quick lookup
            const seatedMap = {};
            if (gameState.seated_players) {
                gameState.seated_players.forEach(p => {
                    seatedMap[p.seat] = p;
                });
            }

            // Get game state players map (if hand is in progress)
            const gamePlayersMap = {};
            if (gameState.game_state && gameState.game_state.players) {
                gameState.game_state.players.forEach(p => {
                    gamePlayersMap[p.seat] = p;
                });
            }

            // Render all 5 seats
            for (let seatNum = 0; seatNum < 5; seatNum++) {
                const seatEl = document.createElement('div');
                seatEl.className = 'seat';

                const seatedPlayer = seatedMap[seatNum];
                const gamePlayer = gamePlayersMap[seatNum];

                if (seatNum === gameState.current_player_seat) {
                    seatEl.classList.add('current');
                }

                const gameState_data = gameState.game_state || {};
                const buttonSeat = gameState_data.button_seat;
                if (seatNum === buttonSeat && buttonSeat !== null && buttonSeat !== undefined) {
                    seatEl.classList.add('button');
                    // Add dealer button indicator
                    const dealerButton = document.createElement('div');
                    dealerButton.className = 'dealer-button';
                    dealerButton.textContent = 'D';
                    dealerButton.title = 'Dealer Button';
                    seatEl.style.position = 'relative';
                    seatEl.appendChild(dealerButton);
                }

                if (gamePlayer && gamePlayer.is_folded) {
                    seatEl.classList.add('folded');
                }

                if (seatedPlayer) {
                    // Seat is occupied
                    const stack = gamePlayer ? gamePlayer.stack : 1000; // Default starting stack
                    const stackColor = stack > 500 ? '#22c55e' : stack > 100 ? '#fbbf24' : '#ef4444';

                    let seatHTML = `
                        <div class="seat-number">Seat ${seatNum + 1}</div>
                        <div class="player-name">${seatedPlayer.username}</div>
                    `;

                    if (gamePlayer) {
                        // Game in progress - show game info
                        // Show cards
                        if (gamePlayer.cards && gamePlayer.cards.length > 0) {
                            const cardsDisplay = gamePlayer.cards.slice(0, 2).join(' ');
                            const extraCount = gamePlayer.cards.length > 2 ? ` +${gamePlayer.cards.length - 2}` : '';
                            seatHTML += `<div class="cards-display">${cardsDisplay}${extraCount}</div>`;
                        }
                        seatHTML += `
                            <div class="player-circles">
                                <div class="circle circle-normal">N: ${gamePlayer.normal_circle}</div>
                                <div class="circle circle-escrow">E: ${gamePlayer.escrow_circle}</div>
                            </div>
                            <div class="player-stack" style="color: ${stackColor}">
                                ${gamePlayer.stack} 💰
                            </div>
                        `;
                    } else {
                        // Waiting for game to start
                        seatHTML += `<div class="player-stack" style="color: #bbb;">1000 💰</div>`;
                    }

                    seatEl.innerHTML = seatHTML;
                    seatEl.style.opacity = gamePlayer && gamePlayer.is_folded ? '0.6' : '1';
                } else {
                    // Empty seat
                    seatEl.classList.add('empty');
                    seatEl.innerHTML = `
                        <div class="seat-number">Seat ${seatNum + 1}</div>
                        <div class="seat-status">Empty</div>
                        <button class="join-btn" onclick="joinSeat(${seatNum})">Join</button>
                    `;
                }

                container.appendChild(seatEl);
            }
        }

        function updateUI() {
            if (!gameState) {
                console.log('[UI] gameState is null, returning');
                return;
            }

            try {
                const gameState_data = gameState.game_state || {};
                const phase = gameState.phase || 'setup';
                const currentPlayerSeat = gameState_data.current_player_seat;
                const currentStep = gameState_data.current_action_step || 0;

                console.log('[UI] === START updateUI ===');
                console.log('[UI] gameState keys:', Object.keys(gameState));
                console.log('[UI] gameState_data keys:', Object.keys(gameState_data));
                console.log('[UI] phase=' + phase + ', currentPlayerSeat=' + currentPlayerSeat + ', currentStep=' + currentStep);

                const myUserSeat = getCurrentUserSeat();
                const isMyTurn = currentPlayerSeat === myUserSeat;

                console.log('[TURN] currentPlayerSeat=' + currentPlayerSeat + ', myUserSeat=' + myUserSeat);
                console.log('[TURN] isMyTurn=' + isMyTurn + ' (types: ' + typeof currentPlayerSeat + ' vs ' + typeof myUserSeat + ')');
                console.log('[TURN] phase=' + phase + ', isMyTurn=' + isMyTurn);
                console.log('[TURN] Will show actionPanel? ' + (isMyTurn && phase !== 'setup'));

            // Update phase
            document.getElementById('phaseValue').textContent = phase.charAt(0).toUpperCase() + phase.slice(1);
            document.getElementById('currentPhase').innerHTML = `<value>${phase}</value>`;

            // Update pots
            const normal = gameState.normal_pot || 0;
            const escrow = gameState.escrow_pot || 0;
            const total = normal + escrow;

            document.getElementById('normalPot').textContent = normal;
            document.getElementById('escrowPot').textContent = escrow;
            document.getElementById('totalPot').textContent = total;

            // Update buttons
            const readyBtn = document.getElementById('readyBtn');
            const advanceBtn = document.getElementById('advanceBtn');
            const seatedCount = gameState.seated_players ? gameState.seated_players.length : 0;
            const hasButtonAssigned = gameState_data.button_seat !== null && gameState_data.button_seat !== undefined;

            // Show/hide ready button based on game phase
            if (phase === 'setup' && seatedCount >= 2 && !hasButtonAssigned) {
                readyBtn.style.display = 'block';
                readyBtn.disabled = false;
            } else {
                readyBtn.style.display = 'none';
            }

            // Show advance button if button is assigned and still in SETUP phase
            if (phase === 'setup' && hasButtonAssigned) {
                advanceBtn.style.display = 'block';
                advanceBtn.disabled = false;
            } else {
                advanceBtn.style.display = 'none';
                advanceBtn.disabled = phase === 'hand_over';
            }

            // Update action panel visibility and content
            const actionPanel = document.getElementById('actionPanel');
            console.log('[DOM] actionPanel element exists:', !!actionPanel);
            console.log('[DOM] actionPanel element:', actionPanel);

            if (!actionPanel) {
                console.error('[ERROR] actionPanel not found in DOM!');
            }

            console.log('[PANEL] isMyTurn=' + isMyTurn + ', phase !== setup: ' + (phase !== 'setup'));
            console.log('[PANEL] Will set actionPanel.display to: ' + (isMyTurn && phase !== 'setup' ? 'block' : 'none'));

            if (isMyTurn && phase !== 'setup') {
                console.log('[PANEL] === SHOWING ACTION PANEL ===');
                actionPanel.style.display = 'block';
                console.log('[PANEL] actionPanel.style.display is now: ' + actionPanel.style.display);
                updateActionPanel(gameState_data, phase, currentStep);
            } else {
                console.log('[PANEL] === HIDING ACTION PANEL ===');
                actionPanel.style.display = 'none';
                console.log('[PANEL] actionPanel.style.display is now: ' + actionPanel.style.display);
            }

            // Log DOM state after
            const escrowActions = document.getElementById('escrowActions');
            const normalBetActions = document.getElementById('normalBetActions');
            const drawActions = document.getElementById('drawActions');
            console.log('[DOM] escrowActions.display=' + (escrowActions?.style.display || 'N/A'));
            console.log('[DOM] normalBetActions.display=' + (normalBetActions?.style.display || 'N/A'));
            console.log('[DOM] drawActions.display=' + (drawActions?.style.display || 'N/A'));

            // Update ready status display
            const readyStatus = document.getElementById('readyStatus');
            if (hasButtonAssigned && phase === 'setup') {
                // Button has been assigned - show button info
                const buttonPlayer = gameState.seated_players.find(p => p.seat === gameState_data.button_seat);
                const buttonName = buttonPlayer ? buttonPlayer.username : `Seat ${gameState_data.button_seat}`;
                readyStatus.innerHTML = `<strong>🎯 Button:</strong> ${buttonName}<br><small>Hand starting...</small>`;
                readyStatus.style.display = 'block';
            } else if (phase === 'setup' && seatedCount >= 2) {
                readyStatus.textContent = `Click "Ready" to assign button with RNG (${seatedCount} players seated)`;
                readyStatus.style.display = 'block';
            } else if (phase === 'setup' && seatedCount < 2) {
                readyStatus.textContent = `Waiting for ${2 - seatedCount} more player(s)...`;
                readyStatus.style.display = 'block';
            } else {
                readyStatus.style.display = 'none';
            }

            // Update status
            if (phase !== 'setup' && currentPlayerSeat !== null) {
                // Game in progress - show current player
                const players = gameState_data.players || [];
                const player = players.find(p => p.seat === currentPlayerSeat);
                if (player) {
                    const stepText = phase === 'draw' ? '' : (currentStep === 0 ? ' (Escrow Step)' : ' (Betting)');
                    document.getElementById('status').innerHTML = `
                        <strong>${player.username}'s Turn${stepText}</strong>
                    `;
                }
            } else if (seatedCount < 2) {
                // Waiting for more players
                document.getElementById('status').innerHTML = `Waiting for players... (${seatedCount}/2)`;
            } else if (hasButtonAssigned && phase === 'setup') {
                // Button assigned, waiting to start
                document.getElementById('status').innerHTML = `🎯 Button assigned - Hand starting...`;
            } else {
                // Ready or waiting
                document.getElementById('status').innerHTML = `${seatedCount} players seated - Click Ready to start`;
            }

            console.log('[UI] === END updateUI (success) ===');

            } catch (uiError) {
                console.error('[ERROR] Exception in updateUI:', uiError, uiError.stack);
            }
        }

        function updateActionPanel(gameState_data, phase, currentStep) {
            console.log('[ACTIONS] === ENTRY updateActionPanel, phase=' + phase + ', step=' + currentStep);

            const stepDisplay = document.getElementById('stepDisplay');
            const escrowActions = document.getElementById('escrowActions');
            const normalBetActions = document.getElementById('normalBetActions');
            const drawActions = document.getElementById('drawActions');

            console.log('[ACTIONS] Elements exist: stepDisplay=' + !!stepDisplay + ', escrowActions=' + !!escrowActions + ', normalBetActions=' + !!normalBetActions + ', drawActions=' + !!drawActions);

            if (!stepDisplay || !escrowActions || !normalBetActions || !drawActions) {
                console.error('[ERROR] Missing action panel elements!');
                return;
            }

            // Hide all action types first
            console.log('[ACTIONS] Hiding all action types');
            escrowActions.style.display = 'none';
            normalBetActions.style.display = 'none';
            drawActions.style.display = 'none';

            if (phase === 'preflop' || phase === 'river') {
                console.log('[ACTIONS] Phase is preflop/river');
                if (currentStep === 0) {
                    // Escrow step
                    console.log('[ACTIONS] Step 0: showing ESCROW_ACTIONS');
                    stepDisplay.innerHTML = '<span class="step-indicator">Escrow Step</span>';
                    escrowActions.style.display = 'block';
                } else {
                    // Normal betting step
                    console.log('[ACTIONS] Step ' + currentStep + ': showing NORMAL_BET_ACTIONS');
                    stepDisplay.innerHTML = '<span class="step-indicator">Betting Round</span>';
                    normalBetActions.style.display = 'block';
                    updateBettingActions(gameState_data);
                }
            } else if (phase === 'draw') {
                console.log('[ACTIONS] Phase is draw: showing DRAW_ACTIONS');
                stepDisplay.innerHTML = '<span class="step-indicator">Draw Phase</span>';
                drawActions.style.display = 'block';
                updateDrawActions(gameState_data);
            }
        }

        function updateBettingActions(gameState_data) {
            console.log('[BUTTONS] === updateBettingActions ENTRY');

            const buttonsDiv = document.getElementById('betActionButtons');
            const limitsDiv = document.getElementById('betLimits');

            console.log('[BUTTONS] buttonsDiv exists:', !!buttonsDiv);
            console.log('[BUTTONS] limitsDiv exists:', !!limitsDiv);

            if (!buttonsDiv || !limitsDiv) {
                console.error('[ERROR] betActionButtons or betLimits div not found!');
                return;
            }

            const currentHighest = gameState_data.current_highest_normal || 0;
            const normalPot = gameState_data.normal_pot || 0;
            const escrowPot = gameState_data.escrow_pot || 0;
            const potLimit = currentHighest + (normalPot + escrowPot);

            console.log('[BUTTONS] currentHighest=' + currentHighest);
            console.log('[BUTTONS] normalPot=' + normalPot + ', escrowPot=' + escrowPot);
            console.log('[BUTTONS] potLimit=' + potLimit);

            const html = `
                <div class="action-buttons-grid">
                    <button class="action-btn action-btn-small" onclick="playerAction('check')">Check</button>
                    <button class="action-btn action-btn-small" onclick="playerAction('fold')">Fold</button>
                    ${currentHighest > 0 ? `<button class="action-btn action-btn-small" onclick="playerAction('call', ${currentHighest})">Call ${currentHighest}</button>` : ''}
                    <button class="action-btn action-btn-small" onclick="showBetInput()">Bet</button>
                </div>
            `;

            console.log('[BUTTONS] Generated HTML:', html);
            console.log('[BUTTONS] Setting buttonsDiv.innerHTML');

            try {
                buttonsDiv.innerHTML = html;
                console.log('[BUTTONS] Successfully set buttonsDiv.innerHTML');
            } catch (e) {
                console.error('[ERROR] Failed to set buttonsDiv.innerHTML:', e);
            }

            try {
                limitsDiv.innerHTML = `Pot Limit: ${potLimit} | Highest Bet: ${currentHighest}`;
                console.log('[BUTTONS] Successfully set limitsDiv.innerHTML');
            } catch (e) {
                console.error('[ERROR] Failed to set limitsDiv.innerHTML:', e);
            }
        }

        function updateDrawActions(gameState_data) {
            console.log('[DRAW] === updateDrawActions ENTRY');

            const currentPlayerSeat = gameState_data.current_player_seat;
            console.log('[DRAW] currentPlayerSeat=' + currentPlayerSeat);

            const players = gameState_data.players || [];
            console.log('[DRAW] players count=' + players.length);
            console.log('[DRAW] players:', players);

            const player = players.find(p => p.seat === currentPlayerSeat);
            console.log('[DRAW] Found player:', player);

            if (!player) {
                console.error('[ERROR] Could not find player for seat ' + currentPlayerSeat);
                return;
            }

            console.log('[DRAW] player.cards_drawn=' + player.cards_drawn);
            console.log('[DRAW] player.cards=' + JSON.stringify(player.cards));

            // Show double if cards_drawn === 0
            const doubleBtn = document.getElementById('doubleBtn');
            if (!doubleBtn) {
                console.error('[ERROR] doubleBtn not found in DOM');
            } else {
                const showDouble = player.cards_drawn === 0;
                console.log('[DRAW] Setting doubleBtn.display=' + (showDouble ? 'block' : 'none'));
                doubleBtn.style.display = showDouble ? 'block' : 'none';
            }

            // Show split if cards_drawn === 0 and same rank
            const splitBtn = document.getElementById('splitBtn');
            if (player.cards && player.cards.length === 2 && player.cards_drawn === 0) {
                const rank1 = player.cards[0].slice(0, -1);
                const rank2 = player.cards[1].slice(0, -1);
                splitBtn.style.display = rank1 === rank2 ? 'block' : 'none';
            } else {
                splitBtn.style.display = 'none';
            }
        }

        function getCurrentUserSeat() {
            console.log('[USER_SEAT] === ENTRY ===');
            if (!gameState) {
                console.log('[USER_SEAT] ERROR: gameState is null');
                return null;
            }
            if (!gameState.current_user_id) {
                console.log('[USER_SEAT] ERROR: current_user_id not set in gameState');
                console.log('[USER_SEAT] gameState keys:', Object.keys(gameState));
                return null;
            }

            const seatedPlayers = gameState.seated_players || [];
            console.log('[USER_SEAT] current_user_id=' + gameState.current_user_id);
            console.log('[USER_SEAT] seated_players count=' + seatedPlayers.length);
            console.log('[USER_SEAT] seated_players:', seatedPlayers);

            const myPlayer = seatedPlayers.find(p => {
                console.log('[USER_SEAT] Checking player id=' + p.user_id + ', seat=' + p.seat + ', match=' + (p.user_id === gameState.current_user_id));
                return p.user_id === gameState.current_user_id;
            });

            const result = myPlayer ? myPlayer.seat : null;
            console.log('[USER_SEAT] Found my seat: ' + result);
            console.log('[USER_SEAT] My player object:', myPlayer);
            return result;
        }

        function showEscrowInput() {
            const inputGroup = document.getElementById('escrowInputGroup');
            inputGroup.style.display = 'flex';
            document.getElementById('escrowAmount').focus();
        }

        function submitEscrow() {
            const amount = parseInt(document.getElementById('escrowAmount').value) || 0;
            playerAction('add_escrow', amount);
        }

        function showBetInput() {
            // Show modal or input for bet amount
            const amount = prompt('Enter bet amount:');
            if (amount) {
                playerAction('bet', parseInt(amount));
            }
        }

        async function toggleReady() {
            try {
                const response = await fetch(`/blackjack/api/table/${TABLE_ID}/player_ready`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to mark as ready');
                }

                const data = await response.json();
                isPlayerReady = !isPlayerReady;

                // Update button appearance
                const btn = document.getElementById('readyBtn');
                btn.textContent = isPlayerReady ? '✓ Ready' : '○ Not Ready';
                btn.style.background = isPlayerReady ? '#22c55e' : '#6b7280';

                updateGameState();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        async function advancePhase() {
            try {
                const response = await fetch(`/blackjack/api/table/${TABLE_ID}/advance_phase`, {
                    method: 'POST',
                });

                if (!response.ok) throw new Error('Failed to advance phase');

                updateGameState();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        async function joinSeat(seatNumber) {
            try {
                console.log('[JOIN] Joining seat:', seatNumber);
                // Emit join_table event with specific seat
                socket.emit('join_table', { table_id: TABLE_ID, seat: seatNumber });
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        async function playerAction(actionName, amount = 0) {
            console.log('[ACTION] === playerAction ENTRY, action=' + actionName + ', amount=' + amount);

            try {
                const gameState_data = gameState.game_state || {};
                const currentPlayerSeat = gameState_data.current_player_seat;

                console.log('[ACTION] currentPlayerSeat=' + currentPlayerSeat);

                if (currentPlayerSeat === null || currentPlayerSeat === undefined) {
                    console.error('[ERROR] currentPlayerSeat is null/undefined, cannot take action');
                    throw new Error('Not your turn');
                }

                const payload = {
                    table_id: TABLE_ID,
                    seat: currentPlayerSeat,
                    action: actionName,
                    amount: amount
                };

                console.log('[ACTION] Sending payload:', payload);

                // Emit action via Socket.IO
                socket.emit('table_action', payload);

                // Clear input fields
                document.getElementById('escrowInputGroup').style.display = 'none';
                document.getElementById('escrowAmount').value = '';

                console.log('[ACTION] Emitted table_action');
            } catch (error) {
                console.error('[ERROR] playerAction error:', error, error.stack);
                alert(`Error: ${error.message}`);
            }
        }

        // Socket.IO event listeners
        socket.on('connected', function(data) {
            console.log('Connected to blackjack socket:', data);
        });

        socket.on('table_state', function(state) {
            console.log('[API] Full response received:', state);

            gameState = state;

            try {
                console.log('[RENDER] Calling renderTable()');
                renderTable();
            } catch (renderError) {
                console.error('[ERROR] Error in renderTable:', renderError, renderError.stack);
            }

            try {
                console.log('[RENDER] Calling updateUI()');
                updateUI();
            } catch (uiError) {
                console.error('[ERROR] Error in updateUI:', uiError, uiError.stack);
            }
        });

        socket.on('player_joined', function(data) {
            console.log('Player joined:', data);
            updateGameState();
        });

        socket.on('error', function(data) {
            console.error('Socket error:', data.message);
            document.getElementById('status').innerHTML = `❌ Error: ${data.message}`;
        });

        socket.on('disconnect', function() {
            console.log('Disconnected from blackjack socket');
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            socket.disconnect();
        });

        // Global error handling
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('[ERROR] Uncaught error:', msg);
            console.error('[ERROR] URL:', url);
            console.error('[ERROR] Line:', lineNo);
            console.error('[ERROR] Column:', columnNo);
            console.error('[ERROR] Stack:', error?.stack);
            return false;
        };

        window.addEventListener('error', function(event) {
            console.error('[ERROR] Global error event:', event.error);
            console.error('[ERROR] Stack:', event.error?.stack);
        });

        console.log('[INIT] Script loaded, ready to play!');
    </script>
</body>
</html>
